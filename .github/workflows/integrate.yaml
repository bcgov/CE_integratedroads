name: integrate
run-name: ${{ github.actor }} Integrate roads workflow
on:
  workflow_dispatch:
  workflow_call:
env:
  DATABASE_URL: ${{ vars.DATABASE_URL }}
  AWS_ENDPOINT_URL: ${{ vars.AWS_ENDPOINT_URL }}
  AWS_S3_ENDPOINT: ${{ vars.AWS_S3_ENDPOINT  }}
  AWS_VIRTUAL_HOSTING: ${{ vars.AWS_VIRTUAL_HOSTING }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  BUCKET: ${{ secrets.BUCKET }}
  AWS_REQUEST_CHECKSUM_CALCULATION: when_required
  AWS_RESPONSE_CHECKSUM_VALIDATION: when_required
  AWS_EC2_METADATA_DISABLED: ${{ vars.AWS_EC2_METADATA_DISABLED }}
  CPL_VSISTDIN_BUFFER_LIMIT: ${{ vars.CPL_VSISTDIN_BUFFER_LIMIT }}
jobs:
  get-matrix:
    runs-on: ubuntu-latest
    container: ghcr.io/bcgov/ce_integratedroads-runner:main
    environment: production
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
    - id: set-matrix
      shell: bash
      run: |
        DATA=$(ogr2ogr -f GeoJSON /vsistdout/ /vsis3/$BUCKET/sources/whse_basemapping.bcgs_20k_grid.parquet \
          -sql "SELECT DISTINCT SUBSTR(map_tile, 1, 4) AS map_tile FROM \"whse_basemapping.bcgs_20k_grid\"" \
          -dialect SQLite \
        | jq -c '[.features[].properties] | to_entries | map(.value + {row: .key + 1})')
        echo "matrix={\"include\":$DATA}" >> $GITHUB_OUTPUT
  integratedroads:
    runs-on: ubuntu-latest
    container: ghcr.io/bcgov/ce_integratedroads-runner:main
    environment: production
    needs: get-matrix
    strategy:
      matrix: ${{fromJson(needs.get-matrix.outputs.matrix)}}
    services:
      postgres:
        image: ghcr.io/bcgov/ce_integratedroads-db:main
        env:
          POSTGRES_PASSWORD: postgres
        # Set health checks to wait until postgres has started
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Check out repository code
        uses: actions/checkout@v5
      - name: integrate
        shell: bash
        run:  |
          delay=${{ matrix.row }}
          echo "Delaying for $delay seconds"
          sleep "$delay"
          jobs/05_load ${{ matrix.map_tile }}
          jobs/06_integrate ${{ matrix.map_tile }}